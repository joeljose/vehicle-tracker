# Site → video mapping for training pipeline.
# Each junction has 7 videos (1×20 min + 6×30 min). Total: 200 min/site, 600 min overall.
# Inventory captured 2026-04-10 from data_collection/site_videos/.
# Site slugs satisfy ^[a-zA-Z0-9_-]+$ (matches backend/config/site_config.py validation).
#
# Source FPS varies by junction:
#   junction_741_73           : 60 fps
#   junction_741_lytle_south  : 30 fps
#   junction_drugmart_73      : 60 fps
# This is irrelevant to the current pipeline because `ffmpeg -vf fps=1` is
# wall-clock based — all sites yield one frame per second regardless. Lytle
# South frames may have slightly more motion blur (~33 ms exposure vs ~16 ms).
# If you ever change extraction to a source-frame stride (e.g. `select=not(mod(n,N))`),
# you MUST normalize per source FPS or you'll halve Lytle's coverage.

