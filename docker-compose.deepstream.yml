services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.deepstream
    runtime: nvidia
    user: "${DS_UID}:${DS_GID}"
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./data_collection:/data
      - ./snapshots:/app/snapshots
      - ./experiments:/app/experiments
      - ./models:/app/models
      - ./.ds-cache:/home/ds
    ports:
      - "8000:8000"
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - HOME=/home/ds
      - PATH=/home/ds/.local/bin:/usr/local/bin:/usr/bin:/bin
      - PYTHONPATH=/home/ds/.local/lib/python3.12/site-packages
      - VT_BACKEND=deepstream
    stdin_open: true
    tty: true
