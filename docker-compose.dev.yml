services:
  backend:
    image: nvcr.io/nvidia/deepstream:8.0-gc-triton-devel
    runtime: nvidia
    user: "${DS_UID}:${DS_GID}"
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./data_collection:/data
      - ./snapshots:/app/snapshots
      - ./experiments:/app/experiments
      - ./models:/app/models
      - ./.ds-cache:/home/ds
    ports:
      - "8000:8000"
    working_dir: /app
    entrypoint: ["bash", "-c"]
    command: ["pip3 install --quiet --break-system-packages --user -r backend/requirements.txt && echo 'Dev environment ready.' && tail -f /dev/null"]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - HOME=/home/ds
      - PATH=/home/ds/.local/bin:/usr/local/bin:/usr/bin:/bin
      - PYTHONPATH=/home/ds/.local/lib/python3.12/site-packages
    stdin_open: true
    tty: true

  frontend:
    image: node:22-alpine
    user: "${DS_UID}:${DS_GID}"
    volumes:
      - ./frontend:/app
      - ./.node-cache:/home/node
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      - HOME=/home/node
      - npm_config_cache=/home/node/.npm
    command: ["sh", "-c", "npm install && npm run dev -- --host"]

