services:
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: vehicle_tracker-label-studio
    ports:
      - "8080:8080"
    volumes:
      # Named volume managed by docker — avoids host UID/permission issues
      # that bite when bind-mounting an empty directory.
      - label_studio_data:/label-studio/data
      # Read-only mount of the M8-P1.5 v2 comparison images so LS can serve
      # them via local-files storage. Path inside LS (must be a subdirectory
      # of LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files):
      #   /label-studio/files/comparison/images/{slug}/{stem}.jpg
      - ./training/data/comparison/images:/label-studio/files/comparison/images:ro
    environment:
      # Auto-provision a single user + token on first launch so the setup
      # script can use the API immediately without anyone touching the UI.
      - LABEL_STUDIO_USERNAME=joel@vt.local
      - LABEL_STUDIO_PASSWORD=vtlabels2026
      - LABEL_STUDIO_USER_TOKEN=vt_p1_5_token_2026
      # Allow LS to serve files from /label-studio/files (the mount above).
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
      # Disable the "have you signed up?" prompt and other onboarding nags
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      # Modern LS defaults to JWT; we use the simple Authorization: Token <key>
      # scheme so the setup script doesn't need to do a login dance.
      - LABEL_STUDIO_ENABLE_LEGACY_API_TOKEN=true
    restart: unless-stopped

volumes:
  label_studio_data:
